# TIDES tolerances — single source of truth for every acceptance threshold.
# Mirror of 50-verification/51-tolerances.md. Changing any number requires S9
# sign-off and a written justification in this file's history.

# --- WP1: Tile substrate (see 51-tolerances.md rung-1) ---
wp1:
  rung1_kernel:
    ulp_fp32: 8              # default 8 ulp FP32-equivalent
    f64e_ulp: 4              # f64e: <=4x FP64 ulp bound
  spgemm_filter:
    fp32_rel: 1.0e-12
    mixed_rel: 1.0e-6
  f64e_trace_rel: 1.0e-13

# --- WP2: Basis & integrals ---
wp2:
  # T2.1: hydrogenic eigenvalues vs exact eps_n = -Z^2/(2n^2)
  hydrogenic_eigenvalues:
    # 2nd-order 3-point stencil on uniform grid; achievable at stated n_r.
    # 1e-10 target reached via non-uniform grid / Numerov (T2.2 refinement).
    H_l0_1s:
      tolerance: 5.0e-7      # n_r=50000, uniform grid
      target: 1.0e-10        # with non-uniform grid (T2.2)
    H_l1:
      tolerance: 1.5e-8      # n_r=50000
      target: 1.0e-10
    He_l0:
      tolerance: 4.0e-5      # n_r=16000
    C5plus_l0:
      tolerance: 1.0e-3      # n_r=16000
  # T2.3: pseudopotential validators
  pseudo:
    norm_conservation_rel: 1.0e-4
    ghost_detector: "sharp-feature outlier (median+50*MAD)"
  # T2.4: two-center integrals
  two_center:
    rotation_invariance: 1.0e-12   # addition theorem + trace invariance
    spline_value: 1.0e-7           # cubic spline on 5000 pts, Gaussian model
    spline_derivative: 1.0e-5
    pyscf_overlap: 1.0e-8          # when PySCF available
  # T2.6: derivative streams
  derivatives:
    fd5_vs_exact: 1.0e-8          # 5-point FD machinery gate (MANDATORY)
    fd5_sum_vs_exact: 1.0e-8      # sum of derivatives, FD gate
    spline_vs_analytic: 3.0e-4     # spline O(h^3) accuracy

# --- WP3: Grids, Poisson, XC ---
wp3:
  # T3.1: dual-grid index map + halo spec
  dual_grid:
    flatten_unflatten: "exact round-trip"
    coord_mapping: "exact"
    refinement_ratio: "integer validation"
    halo_spec: "documented (periodic, n_halo, owned ranges)"
  # T3.4: Poisson Gaussian-charge Hartree energy
  poisson:
    free_bc: 2.0e-3               # 16^3 direct sum with self-term reg
    wire_bc: 2.0e-3
    slab_bc: 2.0e-3
    periodic_bc: 5.0e-2            # naive DFT; cuFFT reaches 1e-10
    target: 1.0e-10                # with cuFFT + finer grid (GPU path)
  # T3.2: rho builder
  rho_builder:
    integral_ne: 1.0e-3            # Gaussian orbital grid integral (h=0.5)
    target: 1.0e-10                # finer grid
  # T3.3: v->H adjoint map
  adjoint_map:
    adjointness: 1.0e-12           # MET: 1.67e-15
  # T3.5: libxc / XC grid evaluation
  xc_grid:
    lda_energy: 1.0e-12            # uniform gas analytic (MET: 1e-13)
    pbe_fs0: "exact (=1.0)"
    pbe_fsinf: "exact (=1.804)"
    rung0_rel: 5.0e-14             # Tier-0 FP64 pointwise vs CPU libxc
    energy_abs_ha: 1.0e-8          # T-X1.6: He/Ne/H2O vs PySCF refs
    ab_budget_mev_atom: 0.5        # T-X4.4: nightly A/B mixed-vs-FP64
    adjoint: 5.0e-10              # Tier-0 GGA Tr[V_xc dP] vs FD(E_xc) MET 8.6e-11

# --- WP4: Mid-range solvers (CPU foundation) ---
wp4:
  # T4.1: batched dense eigensolver (R0)
  batched_eig:
    residual: 1.0e-9           # MET: ~1e-14 (machine precision via LAPACK)
    max_n: 400                 # observable: residuals <= 1e-9 at n <= 400
  # T4.3: ChFSI (R1)
  chfsi:
    residual: 1.0e-8           # MET: ~1e-15 (k=0..3); k=4 at 1.3e-10
    scf_iter_within: "+2 of dense"
    subspace_reuse: ">=2x"
  # T4.5: OMM direct minimization
  omm:
    energy_vs_diag: 1.0e-8    # MET: 1.1e-11
    target: 1.0e-8
  # T4.6: broker + tides tune
  broker:
    dispatch_correct: "R0/R1/R2/R3 by N, gap, Te"
    within_10pct_best: true   # MET

# --- WP5: Linear-scaling solvers (CPU foundation) ---
wp5:
  # T5.1: SP2 purification (R2, gapped)
  sp2:
    idempotency: 1.0e-10      # MET: ~1.2e-13 (||P^2-P||_F)
    trace_ne: 1.0e-10          # MET: ~1.6e-13 (|tr(PS)-Ne|)
  # T5.2: Submatrix construction
  submatrix:
    block_idempotency: 1.0e-6  # MET: ~3.3e-13
  # T5.5: FOE (R3, metallic)
  foe:
    trace_ne: 0.5             # MET: ~1e-15 (exact at adequate order)
    order_scaling: "linear in beta (p ~ beta * DeltaH)"
  # T5.6: Fermi-level search
  fermi_search:
    ne_error: 1.0e-12         # MET: 0 (n=1000), 7e-15 (n=100)
  # T5.4: Truncation compensation
  truncation:
    trace_correction: "<1e-8 after"
    improvement_target: ">=5x at fixed radius (CPU ref validates framework)"

# --- WP6: SCF, XL-BOMD, forces, dynamics (CPU foundation) ---
wp6:
  # T6.1: SCF driver
  scf:
    convergence: "documented iteration budget"
    energy_match: 1.0e-6
  # T6.2: energy assembly
  energy:
    component_wise: 1.0e-6  # Ha/atom
  # T6.3: analytic forces [GA1]
  forces:
    fd5_error: 1.0e-6       # Ha/Bohr (FP64); MET: 7.06e-14
  # T6.5: XL-BOMD [GB2]
  xlbomd:
    solves_per_step: "~1"
    nve_drift: 30.0          # uHa/atom/ps (target; CPU ref validates framework)
  # T6.6: optimizers
  optimizers:
    fire_converges: true
    aspc_extrapolate: "order-1 predictor"
    solve_reduction: ">=3x (target)"
  # T6.4: stress
  stress:
    fd_vs_strain: 1.0e-6     # Ha (FP64); MET: 0 at zero strain

# --- WP7: Hybrids, dispersion (CPU foundation) ---
wp7:
  # T7.1: D3(BJ) dispersion
  d3:
    energy_finite: true       # all 10 dimers finite
    force_fd: 1.0e-6         # Ha/Bohr; MET: 7.3e-17
  # T7.2: ISDF
  isdf:
    error_decreases_with_rank: true
  # T7.3: ACE + PBE0
  ace:
    exchange_energy: "exact (model system)"
    pbe0_energy: "exact (model system)"
    target_vs_pyscf: 0.1e-3   # mHa (needs real system + PySCF)
  # T7.5: Hybrid forces
  hybrid_forces:
    fd: 1.0e-6               # Ha/Bohr (FP64); MET: 7.3e-17
  # T7.4: HSE screening (GPU, deferred)
  # T7.6: PAW memo (document)

# --- WP8: Parallel, HPC, packaging (CPU foundation) ---
wp8:
  # T8.4: HDF5 stage-dump/restart
  stage_dump:
    bitwise_round_trip: true   # MET
    schema_version: 1
    injection: true            # MET
  # T8.2: graph partitioner
  partitioner:
    imbalance: 0.10           # MET: 0-4% on 10x10 grid
  # T8.3: halo exchange
  halo_exchange:
    ghost_cells_correct: true # MET: [9,1,2,3,4,5]
    comm_fraction_model: "1.6% at 1MB/10ms"  # profiling model
  # T8.5: packaging + CI
  packaging:
    cmake_presets: "default, cuda, debug, ci"
    one_command_setup: true
    spack_recipe: true
    ci_runner: true
  # T8.1: 2-GPU data model (spec, GPU deferred)
  # T8.6: MPI multi-node (Phase C, deferred)
  # T8.7: HIP quarterly (needs AMD GPU, deferred)

# --- WP9: Verification & benchmarks (the red team) ---
wp9:
  # T9.1: six-rung ladder runner
  ladder:
    rung1_kernel: 1.0e-13      # CPU ref: machine precision
    rung2_operator_overlap: 1.0e-8  # vs PySCF (MET: 8.6e-9)
    rung2_operator_rotation: 1.0e-12  # MET: 1.4e-15
    rung2_operator_poisson: 1.0e-12  # cuFFT vs CPU (MET: 0, machine precision)
    rung2_operator_adjoint: 1.0e-12  # MET: 1.7e-15
    rung3_energy_component: 1.0e-4  # CPU ref (target 1e-6)
    rung3_ab_mixed: 1.0e-6       # relative (MET: 5.4e-8)
    rung4_force_fd: 1.0e-6      # Ha/Bohr (MET: 7.1e-14)
    rung4_stress_fd: 1.0e-6     # Ha (MET: 0)
    rung5_nve_drift: 30.0       # uHa/atom/ps (SKIP: needs full MD)
    rung6_acwf: 0.005           # eV/atom (SKIP: needs full pipeline)
    rung6_s22: 0.35             # kcal/mol (SKIP: needs full pipeline)
    cpu_foundation_status: "10 pass, 0 fail, 3 skip (rungs 5-6 deferred)"
    release_veto: "BLOCKED on rungs 5-6"
  # T9.2: reference data
  reference_data:
    gauntlet10: "10 entries (DOI/license/uncertainty per entry)"
  # T9.3: A/B harness
  ab_harness:
    delta_budget: 5.0e-4       # meV/atom
  # T9.4: FD force checks
  fd_force:
    budget: 1.0e-6            # Ha/Bohr (MET: 7.8e-14)
  # T9.5: competitor farm
  competitor_farm:
    pyscf_reference: "available"
    containers: "Phase B"
  # T9.6: regression dashboard
  dashboard:
    json_lines: "verified (WP2 profiler)"
    energy_metering: "NVML in nightly.sh"
  # T9.7: campaign runner
  campaign:
    archive: "git commit + container digest + inputs"
  # T2.1 observable (2): atomic LDA total energy vs PySCF
  atomic_lda:
    He_vs_pyscf: 1.0e-4            # grid-converged (n=4000)
    Be_vs_pyscf: 8.0e-3
    Ne_vs_pyscf: 5.0e-1            # tight-core grid-limited; 1e-6 needs log grid (T2.2)
    target: 1.0e-6                 # with non-uniform grid
  # T2.4 observable (1): vs PySCF matched-basis overlap
  pyscf_overlap: 1.0e-8            # MET (8.6e-9 with 2000-pt spline table)
  # T2.2: NAO generation
  nao:
    monotone_dzp_tzp: "TZP functions > DZP"
    basis_norm: 1.0e-4             # |norm - 1| within r_cut
    ghost_free: true               # via T2.3 detector
    recipe_hash: "deterministic FNV-1a"

# --- P0.6: Per-term H dump harness (PySCF comparison) ---
# Task p06a-pyscf-harness: element-wise S/T/V_ext vs PySCF on fitted Gaussian basis.
# Effective per-run tolerance = max(nominal, 10x max_fit_residual).
p0_6:
  s_max: 1.0e-5
  t_max: 1.0e-5
  vext_max: 1.0e-4

# --- P0.6b: Becke multicenter quadrature oracle (direct radial integration) ---
# Task p06b-becke-oracle: precision oracle computing S/T/V directly from
# dumped radial tables via Becke partition-of-unity + Gauss-Chebyshev/Lebedev
# grids. No basis fitting. These are the selftest (synthetic dump) tolerances;
# real dumps do NOT hard-fail (deviations measure TIDES grid error).
becke_oracle:
  selftest_s: 1.0e-8      # synthetic Gaussian dump, S must match analytic
  selftest_t: 1.0e-6      # synthetic Gaussian dump, T must match analytic
  selftest_v: 1.0e-6      # synthetic Gaussian dump, V(-Z/r) must match analytic
  ylm_validate: 1.0e-6    # on-site S block convention check
