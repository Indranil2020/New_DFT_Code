# Gauntlet-10: the 10-system smoke set every nightly runs
# Per 50-verification/52: 3 molecules, 2 slabs, 2 bulks (1 metal), a-Si:H 512,
# 64-H2O box, 1 charged/spin case.
# Each entry: name, formula, category, reference_energy, reference_source,
# DOI, license, settings, uncertainty.

entries:
  # --- Molecules ---
  - name: "H2"
    formula: "H2"
    category: "molecule"
    n_atoms: 2
    reference_energy: -1.1745  # Ha (PBE/cc-pVTZ)
    reference_source: "NIST CCCBDB"
    doi: "10.18434/T4D303"
    license: "public"
    settings: "PBE/aug-cc-pVTZ"
    uncertainty: 0.001  # Ha

  - name: "H2O"
    formula: "H2O"
    category: "molecule"
    n_atoms: 3
    reference_energy: -76.4095  # Ha (PBE/aug-cc-pVTZ)
    reference_source: "NIST CCCBDB"
    doi: "10.18434/T4D303"
    license: "public"
    settings: "PBE/aug-cc-pVTZ"
